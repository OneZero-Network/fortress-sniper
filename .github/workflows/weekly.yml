name: Fortress Weekly Incubator + Claude Review

on:
  schedule:
    # Incubator: Sunday 20:00 UTC = Monday 1:30 AM IST (before market open,
    # scans the settled week's data so Sniper can act on fresh pearls Monday)
    - cron: '0 20 * * 0'
    # Weekly review: Monday 04:00 UTC = Monday 9:30 AM IST (after Incubator
    # has run and before/around market open, per your "Monday" request)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually (incubator | review | both)'
        default: 'both'
        required: false

concurrency:
  group: fortress-weekly-pipeline
  cancel-in-progress: false

jobs:
  incubator:
    if: github.event.schedule == '0 20 * * 0' || github.event.inputs.job == 'incubator' || github.event.inputs.job == 'both' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run Incubator weekly scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python workflows/incubator_weekly.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: incubator-run-${{ github.run_id }}
          path: outputs/
          retention-days: 30

  weekly_review:
    if: github.event.schedule == '0 4 * * 1' || github.event.inputs.job == 'review' || github.event.inputs.job == 'both' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run Monday Claude review (Anthropic — learning loop only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python -m core.weekly_review
