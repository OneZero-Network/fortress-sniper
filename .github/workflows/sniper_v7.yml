name: Fortress v7.5 EOD Screener

# ── PATCH-2: Concurrency collision fix ───────────────────────────────────────
# Multiple GHA runs fighting for same pip/DB cache → SQLite amnesia → 1.5KB artifact.
# This block cancels any in-progress run when a new one starts.
concurrency:
  group: sniper-eod-pipeline
  cancel-in-progress: true

on:
  schedule:
    # 18:30 IST = 13:00 UTC Mon-Fri (30 min after NSE close)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      fast_rerun:
        description: 'Skip scoring cache — force fresh run (true/false)'
        required: false
        default: 'false'
      outcome_only:
        description: 'Only run outcome engine, skip screening (true/false)'
        required: false
        default: 'false'
      weekly_review:
        description: 'Force weekly review even if not Monday (true/false)'
        required: false
        default: 'false'

jobs:
  sniper:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Pip cache ─────────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v7-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-v7-${{ runner.os }}-

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            numpy \
            pandas \
            yfinance \
            gspread \
            google-auth \
            google-auth-oauthlib \
            openai \
            beautifulsoup4 \
            lxml

      # ── 5. Restore sniper DB cache ────────────────────────────────────────────
      - name: Restore sniper DB cache
        uses: actions/cache/restore@v4
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v7-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sniper-db-v7-

      - name: Ensure outputs directory
        run: mkdir -p outputs

      # ── 6. Run screener ───────────────────────────────────────────────────────
      - name: Run Fortress v7.5 Screener
        if: ${{ github.event.inputs.outcome_only != 'true' && github.event.inputs.weekly_review != 'true' }}
        env:
          # ── LLM ──────────────────────────────────────────────────────────────
          OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MINI_MODEL:       gpt-4o-mini
          OPENAI_EMBED_MODEL:      text-embedding-3-small
          # ── Telegram ─────────────────────────────────────────────────────────
          TELEGRAM_TOKEN:          ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── Google Sheets ─────────────────────────────────────────────────────
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON:       ${{ secrets.GOOGLE_CREDS_JSON }}
          # ── Account ───────────────────────────────────────────────────────────
          ACCOUNT_EQUITY:          500000
          ACCOUNT_RISK_PCT:        0.015
          # ── Screening gates ───────────────────────────────────────────────────
          MIN_TURNOVER_LAKHS:      50
          MIN_PRICE:               20
          MAX_PRICE:               10000
          MAX_CANDIDATES:          400
          APEX_MIN_SCORE:          48
          APEX_TOP_N:              5
          # ── Regime engine ─────────────────────────────────────────────────────
          ATR_PERIOD:              14
          ATR_MULT_TREND:          1.5
          ATR_MULT_CHOP:           2.0
          ATR_MULT_BUNKER:         2.5
          VIX_TREND_MAX:           15
          VIX_CHOP_MAX:            22
          # ── Phase 3 order flow ────────────────────────────────────────────────
          WHALE_DELIVERY_PCT:      65
          WHALE_VOL_MULT:          1.5
          # ── Alt-data (optional — set SCRAPERAPI_KEY secret to enable CPP/Zauba)
          ALT_DATA_ENABLED:        true
          ALT_DATA_MATCH_SIM:      0.72
          SCRAPERAPI_KEY:          ${{ secrets.SCRAPERAPI_KEY }}
          # ── Addon Finance bhavcopy fallback (optional)
          ADDON_FINANCE_API_KEY:   ${{ secrets.ADDON_FINANCE_API_KEY }}
          # ── Meta-labeler ──────────────────────────────────────────────────────
          META_MIN_SAMPLES:        30
          META_VETO_THRESH:        0.35
          # ── Options gravity ───────────────────────────────────────────────────
          MAX_PAIN_ENABLED:        true
          MAX_PAIN_CALL_OI_BLOCK_PCT: 0.005
          # ── Kelly sizing ──────────────────────────────────────────────────────
          KELLY_LOOKBACK:          20
          KELLY_FRACTION:          0.5
          KELLY_MIN_MULT:          0.25
          KELLY_MAX_MULT:          2.0
          KELLY_MIN_TRADES:        10
          # ── Conviction rerank ─────────────────────────────────────────────────
          CONVICTION_RERANK:       true
          CONV_REQUIRE_CATALYST:   true
          CONV_RS_CATALYST_FLOOR:  85
          CONV_LANE_FORTRESS_MIN:  120
          CONV_LANE_APEX_MIN:      60
          CONV_LANE_FUSED_MIN:     70
          # ── Capacity limits ───────────────────────────────────────────────────
          CAPACITY_MAX_OPEN:       4
          CAPACITY_MAX_WEEK:       6
          # ── v7.5 gate thresholds (tune here without code change) ──────────────
          CONFIDENCE_MIN:          0.45
          CONFIDENCE_STD_MAX:      0.25
          UPTREND_MA_SLACK:        0.03
          # ── Infrastructure ────────────────────────────────────────────────────
          CACHE_PATH:              outputs/sniper_cache.db
          FAST_RERUN:              ${{ github.event.inputs.fast_rerun || 'false' }}
          SUPPRESS_HEALTH_ALERTS:  1
        run: python sniper_v7_eod.py

      # ── 7. Outcome engine only ────────────────────────────────────────────────
      - name: Run Outcome Engine only
        if: ${{ github.event.inputs.outcome_only == 'true' }}
        env:
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_PATH:        outputs/sniper_cache.db
        run: python sniper_v7_eod.py --outcome-only

      # ── 8. Weekly review ──────────────────────────────────────────────────────
      - name: Weekly Review (Monday)
        if: ${{ github.event.inputs.weekly_review == 'true' }}
        env:
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          CACHE_PATH:        outputs/sniper_cache.db
          FORCE_WEEKLY:      true
        run: python sniper_v7_eod.py --weekly-review

      # ── 9. Save sniper DB cache ───────────────────────────────────────────────
      - name: Save sniper DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: outputs/sniper_cache.db
          key: sniper-db-v7-${{ github.run_id }}-${{ github.run_attempt }}

      # ── 10. Upload artifact ───────────────────────────────────────────────────
      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fortress-v7-${{ github.run_id }}
          path: outputs/
          retention-days: 14
          if-no-files-found: warn
          compression-level: 6
