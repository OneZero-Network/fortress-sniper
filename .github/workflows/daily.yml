name: Fortress Daily Sniper

on:
  schedule:
    # 10:30 UTC = 4:00 PM IST, after NSE EOD data settles (market closes 3:30 PM IST)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: fortress-daily-pipeline
  cancel-in-progress: true

jobs:
  sniper:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sniper daily scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          ADDON_FINANCE_API_KEY: ${{ secrets.ADDON_FINANCE_API_KEY }}
        run: python workflows/sniper_daily.py

      - name: Sync Pine levels
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python workflows/pine_sync.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sniper-run-${{ github.run_id }}
          path: outputs/
          retention-days: 30
