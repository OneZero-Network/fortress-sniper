name: SME IPO Snapshot v3.0

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  ipo-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ipo-v3-${{ hashFiles('requirements-ipo-v3.txt') }}
          restore-keys: ${{ runner.os }}-pip-ipo-v3-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ipo-v3.txt

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data
          key: sniper-db-ipo-v3-${{ github.run_id }}
          restore-keys: sniper-db-ipo-v3-

      - name: Run IPO Screener v3
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ipo_scanner_v3.py

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipo-sniper-v3-db
          path: data/ipo_sniper_v3.db
          retention-days: 7
